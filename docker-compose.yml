services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: aida-parallel-change-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_strong_password_123"
    ports:
      - "14333:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Your_strong_password_123 -Q "SELECT 1" -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - sqlserver-data:/var/opt/mssql

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: aida-parallel-change-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__SqlServer: Server=sqlserver,1433;Database=AidaParallelChange;User Id=sa;Password=Your_strong_password_123;TrustServerCertificate=true;Encrypt=false
    depends_on:
      sqlserver:
        condition: service_healthy
    ports:
      - "8080:8080"

  migrator:
    build:
      context: .
      dockerfile: docker/migrations/Dockerfile
    container_name: aida-parallel-change-migrator
    environment:
      ConnectionStrings__SqlServer: Server=sqlserver,1433;Database=AidaParallelChange;User Id=sa;Password=Your_strong_password_123;TrustServerCertificate=true;Encrypt=false
    depends_on:
      sqlserver:
        condition: service_healthy

  ijhttp:
    build:
      context: .
      dockerfile: docker/ijhttp/Dockerfile
    container_name: aida-parallel-change-ijhttp
    working_dir: /workspace
    volumes:
      - .:/workspace

volumes:
  sqlserver-data:
